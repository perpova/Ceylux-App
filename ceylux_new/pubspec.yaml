name: 'Ceylux'
description: Ceylux Cloths Management App
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.3
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  intl: ^0.18.1
  uuid: ^4.3.3
  url_launcher: ^6.2.5
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  pdf: ^3.11.1
  share_plus: ^9.0.0
  path_provider: ^2.1.3
  package_info_plus: ^9.0.1
  ota_update: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#F8F5EF"  
  adaptive_icon_foreground: "assets/images/logo.jpeg"